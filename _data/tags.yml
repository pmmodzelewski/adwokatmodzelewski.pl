# w piramidzie kafelkow na stronie glownej. Sluzby mundurowe
# pierwsze — to wyrozniajaca specjalizacja kancelarii.
#
# Zmieniajac/dodajac obszar praktyki — dodaj/zmien wpis tutaj
# I dodaj/zmien odpowiadajace pliki w _specjalizacje/.
# =====================================================================

