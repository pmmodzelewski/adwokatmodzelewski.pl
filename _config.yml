# =====================================================================
# Jekyll — konfiguracja
# ---------------------------------------------------------------------
# GitHub Pages uruchamia Jekyll automatycznie na pushu.
# Strony statyczne (assets, photo.jpg, CNAME) sa kopiowane 1:1.
# Pliki HTML z front-matterem oraz Markdown w _posts / _specjalizacje
# sa renderowane przez Jekyll/Liquid.
# =====================================================================

title: "Adwokat Piotr Modzelewski"
description: "Kancelaria Adwokacka w Warszawie"
url: "https://adwokatmodzelewski.pl"

# Markdown engine (domyslny dla GitHub Pages)
markdown: kommonmark

# ----- Pluginy (musza byc na allow-liscie GitHub Pages) -----
# jekyll-sitemap: generuje sitemap.xml automatycznie pod /sitemap.xml
plugins:
  - jekyll-sitemap

# ----- Co Jekyll ma ignorowac (nie kopiowac do output) -----
exclude:
  - CLAUDE.md
  - README.md
  - .gitignore
  - FAQ-TEMPLATE.md
  - TRANSLATION.md
  - scripts
  - _old-posts

# ----- Permalinki wpisow (blog i aktualnosci scalone w _posts) -----
# Wynikowy URL: /aktualnosci/2026/05/07/slug/
permalink: /aktualnosci/:year/:month/:day/:slug/

# ----- Kolekcje -----
# _specjalizacje: 6 obszarow praktyki x 2 jezyki = 12 plikow.
# Permalink ustawiamy w front-matterze kazdego pliku (PL: /specjalizacje/SLUG/,
# EN: /en/specjalizacje/SLUG/).
collections:
  specjalizacje:
    output: true

# ----- Domyslny layout / lang -----
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      lang: "pl"
  - scope:
      path: ""
      type: "specjalizacje"
    values:
      layout: "specjalizacja"
